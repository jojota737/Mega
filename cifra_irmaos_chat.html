<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: -apple-system, system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }
  .wrap { max-width: 480px; margin: 0 auto; width: 100%; padding: 20px 16px 0; flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }
  h1 {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .badge {
    width: 34px; height: 34px; background: #fff; color: #000;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; font-weight: bold; font-size: 18px;
    border-radius: 4px; flex-shrink: 0;
  }
  p.sub { color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.5; margin: 0 0 16px; }
  label { display: block; font-family: 'Courier New', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); margin-bottom: 8px; }

  .maintabs { display: flex; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; overflow: hidden; margin-bottom: 20px; flex-shrink: 0; }
  .maintabs button {
    flex: 1; padding: 10px; background: transparent; color: rgba(255,255,255,0.6);
    border: none; font-family: 'Courier New', monospace; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.1em; cursor: pointer;
  }
  .maintabs button.active { background: #fff; color: #000; }

  .screen { display: none; flex: 1; min-height: 0; flex-direction: column; }
  .screen.active { display: flex; }

  /* Cifra screen */
  .modes { display: flex; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; overflow: hidden; margin-bottom: 20px; }
  .modes button {
    flex: 1; padding: 10px; background: transparent; color: rgba(255,255,255,0.6);
    border: none; font-family: 'Courier New', monospace; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.1em; cursor: pointer;
  }
  .modes button.active { background: #fff; color: #000; }
  .key-row { display: flex; gap: 12px; margin-bottom: 20px; }
  input[type=text], input[type=password], textarea {
    background: #000; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
    color: #fff; font-family: 'Courier New', monospace; padding: 10px 12px; font-size: 16px;
    width: 100%;
  }
  input:focus, textarea:focus { outline: none; border-color: #fff; }
  #codeWord { flex: 1; letter-spacing: 0.3em; font-size: 18px; }
  .total-box {
    width: 80px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .total-box span:first-child { font-family: 'Courier New', monospace; font-size: 9px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
  .total-box span:last-child { font-family: 'Courier New', monospace; font-size: 20px; }
  details { margin-bottom: 20px; }
  summary { cursor: pointer; font-family: 'Courier New', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); margin-bottom: 10px; list-style: none; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 10px; }
  .cell { border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 6px 2px; display: flex; flex-direction: column; align-items: center; background: #000; }
  .cell.active { border-color: #fff; background: rgba(255,255,255,0.1); }
  .cell span { font-family: 'Courier New', monospace; font-size: 10px; color: rgba(255,255,255,0.6); }
  .cell-val { font-family: 'Courier New', monospace; font-size: 14px; color: #fff; }
  textarea { resize: none; margin-bottom: 20px; }
  .out-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .ghost-btn { background: none; border: none; color: #fff; font-family: 'Courier New', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }
  #output {
    min-height: 64px; border: 1px solid #fff; border-radius: 6px; padding: 12px;
    font-family: 'Courier New', monospace; font-size: 18px; letter-spacing: 0.05em;
    word-break: break-word; white-space: pre-wrap; margin-bottom: 12px;
  }
  #output.empty { color: rgba(255,255,255,0.4); font-size: 14px; font-family: -apple-system, sans-serif; letter-spacing: normal; }
  #sendToChatBtn {
    width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 6px;
    font-family: 'Courier New', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
    cursor: pointer; margin-bottom: 16px;
  }
  #sendToChatBtn:disabled { opacity: 0.3; }

  /* Auth */
  .box { border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .box button.primary {
    width: 100%; padding: 10px; background: #fff; color: #000; border: none; border-radius: 6px;
    font-family: 'Courier New', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
    margin-top: 4px;
  }
  .authtabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .authtabs button { flex: 1; padding: 8px; background: transparent; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: rgba(255,255,255,0.6); font-family: 'Courier New', monospace; font-size: 11px; text-transform: uppercase; cursor: pointer; }
  .authtabs button.active { background: #fff; color: #000; border-color: #fff; }
  .error-msg { color: #ff6b6b; font-size: 12px; font-family: 'Courier New', monospace; margin: -6px 0 12px; }

  /* Avatar */
  .avatar {
    width: 44px; height: 44px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    background: #171717; border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; font-size: 16px; color: #fff;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar.small { width: 34px; height: 34px; font-size: 13px; }
  .avatar.big { width: 64px; height: 64px; font-size: 22px; }
  .avatar-picker { position: relative; cursor: pointer; }
  .avatar-picker input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  /* Hub */
  .hub-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-shrink: 0; gap: 10px; }

<script>
/* ---------- Firebase setup (isolado, não trava o resto do app se falhar) ---------- */
let db = null, usuariosRef = null, gruposRef = null, mensagensRef = null, firebaseReady = false;
try {
  const firebaseConfig = {
    apiKey: "AIzaSyBZJLzRyUWevDvZYfIvS5BZpNGZAgtmK20",
    authDomain: "projetocd-6088c.firebaseapp.com",
    projectId: "projetocd-6088c",
    storageBucket: "projetocd-6088c.firebasestorage.app",
    messagingSenderId: "1010083786054",
    appId: "1:1010083786054:web:eb5e715c7d3c9966148947",
    measurementId: "G-206XSBFXKZ"
  };
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  usuariosRef = db.collection("usuarios");
  gruposRef = db.collection("grupos");
  mensagensRef = db.collection("mensagens");
  firebaseReady = true;
} catch (e) {
  console.error("Firebase falhou ao iniciar:", e);
  firebaseReady = false;
}

/* ---------- Tabs (Cifra / Chat) ---------- */
const tabCifraBtn = document.getElementById('tabCifraBtn');
const tabChatBtn = document.getElementById('tabChatBtn');
const screenCifra = document.getElementById('screenCifra');
const screenChat = document.getElementById('screenChat');
tabCifraBtn.addEventListener('click', () => {
  tabCifraBtn.classList.add('active'); tabChatBtn.classList.remove('active');
  screenCifra.classList.add('active'); screenChat.classList.remove('active');
});
tabChatBtn.addEventListener('click', () => {
  tabChatBtn.classList.add('active'); tabCifraBtn.classList.remove('active');
  screenChat.classList.add('active'); screenCifra.classList.remove('active');
});

/* ---------- Cifra logic ---------- */
const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const values = {};
ALPHABET.forEach((letter, i) => {
  const pairIndex = Math.floor(i / 2) + 1;
  const isFirstOfPair = i % 2 === 0;
  values[letter] = isFirstOfPair ? -pairIndex : pairIndex + 2;
});
let mode = "encode";
let lastOutput = "";
const grid = document.getElementById('alphaGrid');
ALPHABET.forEach(letter => {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.dataset.letter = letter;
  const displayVal = values[letter] > 0 ? '+' + values[letter] : values[letter];
  cell.innerHTML = `<span>${letter}</span><span class="cell-val">${displayVal}</span>`;
  grid.appendChild(cell);
});
function mod(n, m) { return ((n % m) + m) % m; }
function shiftChar(char, amount) {
  const isUpper = char >= 'A' && char <= 'Z';
  const isLower = char >= 'a' && char <= 'z';
  if (!isUpper && !isLower) return char;
  const base = isUpper ? 65 : 97;
  const code = char.charCodeAt(0) - base;
  return String.fromCharCode(mod(code + amount, 26) + base);
}
function transformText(text, amount) {
  return text.split('').map(c => shiftChar(c, amount)).join('');
}
function updateCifra() {
  const codeWord = document.getElementById('codeWord').value.toUpperCase();
  const codeLetters = codeWord.split('').filter(c => c >= 'A' && c <= 'Z');
  const totalShift = codeLetters.reduce((sum, l) => sum + (values[l] || 0), 0);
  document.getElementById('totalVal').textContent = codeLetters.length ? (totalShift > 0 ? '+' + totalShift : totalShift) : '0';
  document.querySelectorAll('.cell').forEach(cell => {
    cell.classList.toggle('active', codeLetters.includes(cell.dataset.letter));
  });
  const text = document.getElementById('textInput').value;
  const amount = mode === 'encode' ? totalShift : -totalShift;
  const output = text ? transformText(text, amount) : '';
  lastOutput = output;
  const outEl = document.getElementById('output');
  const copyBtn = document.getElementById('copyBtn');
  const sendBtn = document.getElementById('sendToChatBtn');
  if (output) {
    outEl.textContent = output; outEl.classList.remove('empty');
    copyBtn.style.display = 'inline-block'; sendBtn.disabled = false;
  } else {
    outEl.textContent = 'o resultado aparece aqui'; outEl.classList.add('empty');
    copyBtn.style.display = 'none'; sendBtn.disabled = true;
  }
}
document.getElementById('encodeBtn').addEventListener('click', () => {
  mode = 'encode';
  document.getElementById('encodeBtn').classList.add('active');
  document.getElementById('decodeBtn').classList.remove('active');
  document.getElementById('inputLabel').textContent = 'Mensagem verdadeira';
  document.getElementById('outputLabel').textContent = 'Mensagem codificada';
  document.getElementById('textInput').placeholder = 'Escreve aqui...';
  updateCifra();
});
document.getElementById('decodeBtn').addEventListener('click', () => {
  mode = 'decode';
  document.getElementById('decodeBtn').classList.add('active');
  document.getElementById('encodeBtn').classList.remove('active');
  document.getElementById('inputLabel').textContent = 'Mensagem codificada recebida';
  document.getElementById('outputLabel').textContent = 'Mensagem verdadeira';
  document.getElementById('textInput').placeholder = 'Cola o código secreto aqui...';
  updateCifra();
});
document.getElementById('codeWord').addEventListener('input', (e) => {
  e.target.value = e.target.value.toUpperCase(); updateCifra();
});
document.getElementById('textInput').addEventListener('input', updateCifra);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(lastOutput).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'copiado ✓';
    setTimeout(() => btn.textContent = 'copiar', 1500);
  }).catch(() => {});
});
document.getElementById('sendToChatBtn').addEventListener('click', () => {
  if (!lastOutput) return;
  tabChatBtn.click();
  const ci = document.getElementById('chatInput');
  if (ci && chatDetail.style.display !== 'none') { ci.value = lastOutput; ci.focus(); }
});
updateCifra();

/* ---------- Helpers ---------- */
function escapeHtml(str) {
  const d = document.createElement('div'); d.innerText = str; return d.innerHTML;
}
function normalizeUsername(u) {
  return (u || '').trim().toLowerCase().replace(/\s+/g, '');
}
function formatTime(ts) {
  if (!ts || !ts.toDate) return '';
  const d = ts.toDate();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function resizeImageFile(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h) { if (w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; } }
        else { if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function renderAvatarInto(el, photo, initial) {
  if (photo) {
    el.innerHTML = '';
    const img = document.createElement('img');
    img.src = photo;
    el.appendChild(img);
  } else {
    el.textContent = (initial || '?').toUpperCase().slice(0,1);
  }
}

/* ---------- Auth ---------- */
const authBox = document.getElementById('authBox');
const hubBox = document.getElementById('hubBox');
const chatDetail = document.getElementById('chatDetail');
const authTabLogin = document.getElementById('authTabLogin');
const authTabCreate = document.getElementById('authTabCreate');
const authUsername = document.getElementById('authUsername');
const authPassword = document.getElementById('authPassword');
const authError = document.getElementById('authError');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const hubUsername = document.getElementById('hubUsername');
const authPhotoRow = document.getElementById('authPhotoRow');
const authPhotoInput = document.getElementById('authPhotoInput');
const authAvatarPreview = document.getElementById('authAvatarPreview');
const authAvatarInitial = document.getElementById('authAvatarInitial');

let authMode = 'login';
let pendingPhoto = null;
let currentUser = null; // { id, username, photo }
let currentChat = null; // { id, title, isGroup, membros }
let messagesUnsub = null;
let convoUnsubs = [];

authTabLogin.addEventListener('click', () => {
  authMode = 'login';
  authTabLogin.classList.add('active'); authTabCreate.classList.remove('active');
  authSubmitBtn.textContent = 'Entrar'; authError.style.display = 'none';
  authPhotoRow.style.display = 'none';
});
authTabCreate.addEventListener('click', () => {
  authMode = 'create';
  authTabCreate.classList.add('active'); authTabLogin.classList.remove('active');
  authSubmitBtn.textContent = 'Criar conta'; authError.style.display = 'none';
  authPhotoRow.style.display = 'block';
});
authPhotoInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    pendingPhoto = await resizeImageFile(file, 160, 0.6);
    renderAvatarInto(authAvatarPreview, pendingPhoto, '');
  } catch (err) { /* ignore */ }
});
function showAuthError(msg) { authError.textContent = msg; authError.style.display = 'block'; }

authSubmitBtn.addEventListener('click', async () => {
  if (!firebaseReady) { showAuthError('Sem conexão com o servidor. Verifique a internet.'); return; }
  const rawUser = authUsername.value.trim();
  const id = normalizeUsername(rawUser);
  const pass = authPassword.value;
  if (!id || id.length < 3) { showAuthError('Usuário precisa ter pelo menos 3 letras.'); return; }
  if (!pass || pass.length < 3) { showAuthError('Senha precisa ter pelo menos 3 caracteres.'); return; }
  authError.style.display = 'none';
  authSubmitBtn.disabled = true;
  try {
    const docRef = usuariosRef.doc(id);
    const snap = await docRef.get();
    if (authMode === 'create') {
      if (snap.exists) { showAuthError('Esse usuário já existe. Tenta outro ou entra na conta.'); authSubmitBtn.disabled = false; return; }
      await docRef.set({
        username: rawUser, password: pass, photo: pendingPhoto || '', amigos: [],
        criadoEm: firebase.firestore.FieldValue.serverTimestamp()
      });
      loginSuccess(id, rawUser, pendingPhoto || '');
    } else {
      if (!snap.exists) { showAuthError('Esse usuário não existe. Cria uma conta primeiro.'); authSubmitBtn.disabled = false; return; }
      const data = snap.data();
      if (data.password !== pass) { showAuthError('Senha incorreta.'); authSubmitBtn.disabled = false; return; }
      loginSuccess(id, data.username || rawUser, data.photo || '');
    }
  } catch (e) { showAuthError('Deu erro ao conectar. Tenta de novo.'); }
  authSubmitBtn.disabled = false;
});

function loginSuccess(id, displayName, photo) {
  currentUser = { id, username: displayName, photo };
  localStorage.setItem('cifra_userId', id);
  localStorage.setItem('cifra_userDisplay', displayName);
  authUsername.value = ''; authPassword.value = ''; pendingPhoto = null;
  enterHub();
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('cifra_userId');
  localStorage.removeItem('cifra_userDisplay');
  currentUser = null;
  clearConvoUnsubs();
  if (messagesUnsub) { messagesUnsub(); messagesUnsub = null; }
  hubBox.style.display = 'none';
  chatDetail.style.display = 'none';
  authBox.style.display = 'block';
});

/* ---------- Perfil / foto ---------- */
const myAvatarPreview = document.getElementById('myAvatarPreview');
const myAvatarInitial = document.getElementById('myAvatarInitial');
const myPhotoInput = document.getElementById('myPhotoInput');
myPhotoInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !currentUser) return;
  try {
    const photo = await resizeImageFile(file, 160, 0.6);
    await usuariosRef.doc(currentUser.id).update({ photo });
    currentUser.photo = photo;
    renderAvatarInto(myAvatarPreview, photo, '');
  } catch (err) { alert('Não consegui salvar a foto.'); }
});

/* ---------- Hub (conversas) ---------- */
function enterHub() {
  authBox.style.display = 'none';
  chatDetail.style.display = 'none';
  hubBox.style.display = 'flex';
  hubUsername.textContent = currentUser.username;
  renderAvatarInto(myAvatarPreview, currentUser.photo, currentUser.username);
  loadConversations();
}

function clearConvoUnsubs() {
  convoUnsubs.forEach(u => u && u());
  convoUnsubs = [];
}

async function loadConversations() {
  const convoList = document.getElementById('convoList');
  convoList.innerHTML = '<div class="empty-hint">carregando...</div>';
  clearConvoUnsubs();
  try {
    const meSnap = await usuariosRef.doc(currentUser.id).get();
    const meData = meSnap.data() || {};
    const friendIds = meData.amigos || [];

    const friendDocs = await Promise.all(friendIds.map(fid => usuariosRef.doc(fid).get()));
    const friendEntries = friendDocs.filter(d => d.exists).map(d => ({
      type: 'dm', id: dmChatId(currentUser.id, d.id), friendId: d.id,
      nome: d.data().username || d.id, photo: d.data().photo || ''
    }));

    const groupsSnap = await gruposRef.where('membros', 'array-contains', currentUser.id).get();
    const groupEntries = [];
    groupsSnap.forEach(doc => {
      const g = doc.data();
      groupEntries.push({ type: 'group', id: doc.id, nome: g.nome, membros: g.membros || [], photo: '' });
    });

    const all = [...friendEntries, ...groupEntries];
    if (all.length === 0) {
      convoList.innerHTML = '<div class="empty-hint">nenhuma conversa ainda — toca no + pra adicionar amigo ou criar grupo</div>';
      return;
    }
    convoList.innerHTML = '';
    all.forEach(entry => {
      const row = document.createElement('div');
      row.className = 'convo-row';
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'avatar';
      renderAvatarInto(avatarDiv, entry.photo, entry.nome);
      const mid = document.createElement('div');
      mid.className = 'convo-mid';
      mid.innerHTML = `<div class="convo-name">${escapeHtml(entry.nome)}</div><div class="convo-preview" id="preview-${entry.id}">sem mensagens ainda</div>`;
      const timeEl = document.createElement('div');
      timeEl.className = 'convo-time';
      timeEl.id = 'time-' + entry.id;
      row.appendChild(avatarDiv); row.appendChild(mid); row.appendChild(timeEl);
      row.addEventListener('click', () => {
        openChat(entry.id, entry.nome, entry.type === 'group', entry.membros || null);
      });
      convoList.appendChild(row);

      const unsub = mensagensRef.where('chatId', '==', entry.id).onSnapshot((snap) => {
        let last = null;
        snap.forEach(doc => {
          const d = doc.data();
          if (!last || (d.createdAt && last.createdAt && d.createdAt.toMillis() > last.createdAt.toMillis()) || (!last.createdAt && d.createdAt)) last = d;
        });
        const prevEl = document.getElementById('preview-' + entry.id);
        const tEl = document.getElementById('time-' + entry.id);
        if (last && prevEl) {
          prevEl.textContent = last.text || '';
          if (tEl) tEl.textContent = formatTime(last.createdAt);
        }
      });
      convoUnsubs.push(unsub);
    });
  } catch (e) {
    convoList.innerHTML = '<div class="empty-hint">erro ao carregar conversas</div>';
  }
}

function dmChatId(a, b) {
  return 'dm_' + [a, b].sort().join('__');
}

/* ---------- Modal: add friend / create group ---------- */
const addModal = document.getElementById('addModal');
const addTabFriend = document.getElementById('addTabFriend');
const addTabGroup = document.getElementById('addTabGroup');
const addFriendForm = document.getElementById('addFriendForm');
const addGroupForm = document.getElementById('addGroupForm');
document.getElementById('fabBtn').addEventListener('click', () => addModal.classList.add('active'));
document.getElementById('closeAddModal').addEventListener('click', () => addModal.classList.remove('active'));
addTabFriend.addEventListener('click', () => {
  addTabFriend.classList.add('active'); addTabGroup.classList.remove('active');
  addFriendForm.style.display = 'block'; addGroupForm.style.display = 'none';
});
addTabGroup.addEventListener('click', () => {
  addTabGroup.classList.add('active'); addTabFriend.classList.remove('active');
  addGroupForm.style.display = 'block'; addFriendForm.style.display = 'none';
});

document.getElementById('addFriendBtn').addEventListener('click', async () => {
  const input = document.getElementById('newFriendUsername');
  const target = normalizeUsername(input.value);
  if (!target) return;
  if (target === currentUser.id) { alert('Você não pode se adicionar.'); return; }
  try {
    const snap = await usuariosRef.doc(target).get();
    if (!snap.exists) { alert('Esse usuário não existe.'); return; }
    await usuariosRef.doc(currentUser.id).update({
      amigos: firebase.firestore.FieldValue.arrayUnion(target)
    });
    input.value = '';
    addModal.classList.remove('active');
    loadConversations();
  } catch (e) { alert('Erro ao adicionar amigo.'); }
});

document.getElementById('createGroupBtn').addEventListener('click', async () => {
  const input = document.getElementById('newGroupName');
  const nome = input.value.trim();
  if (!nome) return;
  try {
    await gruposRef.add({
      nome: nome, membros: [currentUser.id], criadoPor: currentUser.id,
      criadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });
    input.value = '';
    addModal.classList.remove('active');
    loadConversations();
  } catch (e) { alert('Erro ao criar grupo.'); }
});

/* ---------- Chat detail ---------- */
const messagesEl = document.getElementById('messages');
const chatInput = document.getElementById('chatInput');
const chatGroupTitle = document.getElementById('chatGroupTitle');
const membersBtn = document.getElementById('membersBtn');

function openChat(chatId, title, isGroup, membros) {
  currentChat = { id: chatId, title, isGroup, membros: membros || [] };
  hubBox.style.display = 'none';
  chatDetail.style.display = 'flex';
  chatGroupTitle.textContent = title;
  membersBtn.style.display = isGroup ? 'inline-block' : 'none';

  if (messagesUnsub) messagesUnsub();
  messagesEl.innerHTML = '<div class="empty-chat">carregando...</div>';
  messagesUnsub = mensagensRef.where('chatId', '==', chatId).onSnapshot((snap) => {
    const msgs = [];
    snap.forEach((doc) => msgs.push(doc.data()));
    msgs.sort((a, b) => {
      const ta = a.createdAt ? a.createdAt.toMillis() : 0;
      const tb = b.createdAt ? b.createdAt.toMillis() : 0;
      return ta - tb;
    });
    if (msgs.length === 0) {
      messagesEl.innerHTML = '<div class="empty-chat">nenhuma mensagem ainda</div>';
      return;
    }
    messagesEl.innerHTML = '';
    msgs.forEach((data) => {
      const div = document.createElement('div');
      const mine = data.senderId === currentUser.id;
      div.className = 'msg ' + (mine ? 'mine' : 'theirs');
      div.innerHTML = (mine ? '' : `<div class="sender">${escapeHtml(data.sender || '?')}</div>`) +
        escapeHtml(data.text || '') + `<div class="time">${formatTime(data.createdAt)}</div>`;
      messagesEl.appendChild(div);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, () => { messagesEl.innerHTML = '<div class="empty-chat">erro ao carregar mensagens</div>'; });
}

document.getElementById('backToHubBtn').addEventListener('click', () => {
  if (messagesUnsub) { messagesUnsub(); messagesUnsub = null; }
  currentChat = null;
  chatDetail.style.display = 'none';
  hubBox.style.display = 'flex';
  loadConversations();
});

function sendMessage() {
  if (!firebaseReady || !currentChat) return;
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  mensagensRef.add({
    chatId: currentChat.id, sender: currentUser.username, senderId: currentUser.id,
    text: text, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(() => { alert('Não consegui enviar. Verifique sua internet.'); });
}
document.getElementById('chatSendBtn').addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

/* ---------- Members modal ---------- */
const membersModal = document.getElementById('membersModal');
membersBtn.addEventListener('click', () => {
  if (!currentChat || !currentChat.isGroup) return;
  document.getElementById('membersModalTitle').textContent = 'Membros de ' + currentChat.title;
  const list = document.getElementById('membersModalList');
  list.innerHTML = '';
  currentChat.membros.forEach((m) => {
    const row = document.createElement('div');
    row.className = 'list-row';
    row.innerHTML = `<span class="name">${escapeHtml(m)}</span>`;
    list.appendChild(row);
  });
  membersModal.classList.add('active');
});
document.getElementById('closeMembersModal').addEventListener('click', () => membersModal.classList.remove('active'));
document.getElementById('addMemberBtn').addEventListener('click', async () => {
  const input = document.getElementById('addMemberUsername');
  const target = normalizeUsername(input.value);
  if (!target || !currentChat) return;
  try {
    const snap = await usuariosRef.doc(target).get();
    if (!snap.exists) { alert('Esse usuário não existe.'); return; }
    await gruposRef.doc(currentChat.id).update({
      membros: firebase.firestore.FieldValue.arrayUnion(target)
    });
    currentChat.membros.push(target);
    input.value = '';
    const list = document.getElementById('membersModalList');
    const row = document.createElement('div');
    row.className = 'list-row';
    row.innerHTML = `<span class="name">${escapeHtml(target)}</span>`;
    list.appendChild(row);
  } catch (e) { alert('Erro ao adicionar ao grupo.'); }
});

/* ---------- Auto-login se já tiver conta salva ---------- */
(async function tryAutoLogin() {
  const savedId = localStorage.getItem('cifra_userId');
  const savedDisplay = localStorage.getItem('cifra_userDisplay');
  if (savedId && savedDisplay && firebaseReady) {
    try {
      const snap = await usuariosRef.doc(savedId).get();
      const photo = snap.exists ? (snap.data().photo || '') : '';
      currentUser = { id: savedId, username: savedDisplay, photo };
      enterHub();
    } catch (e) { /* fica na tela de login */ }
  }
})();
</script>
